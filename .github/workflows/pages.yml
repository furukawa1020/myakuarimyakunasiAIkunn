name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: myakuari_ai
        run: flutter pub get

      - name: Build Flutter web
        working-directory: myakuari_ai
        run: flutter build web --release --base-href ${{ steps.pages.outputs.base_path }}

      - name: Prepare privacy page from source file
        run: |
          mkdir -p privacy
          printf -- '---\nlayout: default\ntitle: プライバシーポリシー\n---\n\n' \
            | cat - myakuari_ai/PRIVACY_POLICY.md > privacy/index.md

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Copy Flutter web build into site
        run: cp -r myakuari_ai/build/web/. _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
